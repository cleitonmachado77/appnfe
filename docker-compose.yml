version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nfe_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nfe_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nfe_password}
      POSTGRES_DB: ${POSTGRES_DB:-nfe_delivery}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-nfe_user} -d ${POSTGRES_DB:-nfe_delivery}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
